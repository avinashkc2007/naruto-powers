<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>naruto</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

  <style>
    body { 
      margin: 0; 
      overflow: hidden; 
      background-color: black; 
      font-family: sans-serif;
      touch-action: none;
    }
    #out {
      position: absolute; 
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      object-fit: cover; 
      /* No transform scaleX here, we handle flip in canvas for recording */
      z-index: 2; 
      pointer-events: none;
    }
    /* Hidden media elements */
    #v_src, .fx { 
      display: none; 
    }
    
    /* UI Overlay */
    .ui-container {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 15px;
      pointer-events: auto;
    }

    button {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.4);
      color: white;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 16px;
      backdrop-filter: blur(8px);
      cursor: pointer;
      outline: none;
      transition: all 0.3s ease;
      font-weight: bold;
    }
    
    button:active {
      transform: scale(0.95);
      background: rgba(255, 255, 255, 0.3);
    }

    button.recording {
      background: rgba(255, 0, 0, 0.5);
      border-color: rgba(255, 0, 0, 0.8);
      animation: pulse 1s infinite alternate;
    }

    @keyframes pulse {
      from { transform: scale(1); box-shadow: 0 0 10px rgba(255,0,0,0.5); }
      to { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,0,0,0.8); }
    }
  </style>
</head>
<body>

  <!-- Hidden source video -->
  <video id="v_src" playsinline muted autoplay></video>
  
  <!-- The main output canvas which will be recorded -->
  <canvas id="out"></canvas>

  <!-- Hidden effects -->
  <video id="n" class="fx" src="assets/naruto.mp4" muted autoplay loop playsinline></video>
  <video id="s" class="fx" src="assets/sasuke.mp4" muted autoplay loop playsinline></video>

  <!-- Controls -->
  <div class="ui-container">
    <button id="btn-camera">Swap Camera</button>
    <button id="btn-record">Record</button>
  </div>

  <script>
    const vElement = document.getElementById('v_src');
    const cElement = document.getElementById('out');
    const ctx = cElement.getContext('2d');
    const n = document.getElementById('n');
    const s = document.getElementById('s');
    const btnCamera = document.getElementById('btn-camera');
    const btnRecord = document.getElementById('btn-record');

    let pwr = [0, 0]; 
    let wasOpen = [false, false];
    let lastPos = [[0, 0], [0, 0]];

    // Camera and Recording State
    let useFrontCamera = true;
    let cameraStream = null;
    let isProcessing = false;
    let isRecording = false;
    let mediaRecorder = null;
    let recordedChunks = [];

    // Hand detection logic
    function checkOpen(pts) {
        let count = 0;
        const wrist = pts[0];
        const tips = [8, 12, 16, 20];
        const pips = [6, 10, 14, 18];
        for (let i = 0; i < tips.length; i++) {
            const tip = pts[tips[i]];
            const pip = pts[pips[i]];
            if (Math.hypot(tip.x - wrist.x, tip.y - wrist.y) > Math.hypot(pip.x - wrist.x, pip.y - wrist.y)) count++;
        }
        return count >= 3;
    }

    function onResults(res) {
        if (!vElement.videoWidth) return;

        cElement.width = vElement.videoWidth;
        cElement.height = vElement.videoHeight;
        
        ctx.clearRect(0, 0, cElement.width, cElement.height);

        // 1. Draw web cam feed
        ctx.save();
        if (useFrontCamera) {
            ctx.translate(cElement.width, 0);
            ctx.scale(-1, 1);
        }
        ctx.drawImage(res.image, 0, 0, cElement.width, cElement.height);

        let fL = false;
        let fR = false;

        // 2. Skeletons
        if (res.multiHandLandmarks && res.multiHandedness) {
            res.multiHandLandmarks.forEach((pts, i) => {
                const label = res.multiHandedness[i].label;
                const isR = label === 'Right';
                const idx = isR ? 1 : 0;

                ctx.save();
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#00fbff';
                drawConnectors(ctx, pts, HAND_CONNECTIONS, {color: '#00d4ff', lineWidth: 3});
                drawLandmarks(ctx, pts, {color: '#ffffff', lineWidth: 1, radius: 2});
                ctx.restore();

                const open = checkOpen(pts);
                pwr[idx] += open ? 0.05 : -0.15;
                pwr[idx] = Math.max(0, Math.min(1, pwr[idx]));

                if (open && !wasOpen[idx]) {
                    const vid = isR ? s : n;
                    vid.currentTime = 0;
                    vid.play().catch(e => console.log(e));
                }
                wasOpen[idx] = open;

                const wrist = pts[0];
                const knk = pts[9];

                if (pwr[idx] > 0.01) {
                    if (isR) { 
                        fR = true;
                        lastPos[1][0] = (wrist.x + knk.x) / 2;
                        lastPos[1][1] = (wrist.y + knk.y) / 2;
                    } else { 
                        fL = true;
                        const dx = knk.x - wrist.x;
                        const dy = knk.y - wrist.y;
                        lastPos[0][0] = knk.x + (dx * 0.8);
                        lastPos[0][1] = knk.y + (dy * 0.8);
                    }
                }
            });
        }
        ctx.restore(); // Restore context to normal unflipped (origin top-left)

        // 3. Darkness layer
        ctx.save();
        ctx.globalCompositeOperation = 'multiply';
        ctx.fillStyle = 'rgba(10, 5, 0, 0.4)';
        ctx.fillRect(0, 0, cElement.width, cElement.height);
        ctx.restore();

        // 4. Effects Drawing Helper
        const drawFX = (vid, idx, pwrVal, sizeMult, yOffsetRatio) => {
            if (pwrVal > 0.01 && vid.videoWidth) {
                ctx.save();
                ctx.globalCompositeOperation = 'screen';
                ctx.globalAlpha = pwrVal;
                
                // If using front camera, coordinate tx was from the mirrored view, 
                // but we draw on an un-mirrored context now, so manually mirror X.
                const tx = useFrontCamera ? (1 - lastPos[idx][0]) : lastPos[idx][0];
                const ty = lastPos[idx][1];

                const vW = cElement.width * sizeMult;
                const vH = vid.videoHeight * (vW / vid.videoWidth);
                
                const drawX = (tx * cElement.width) - vW/2;
                const drawY = (ty * cElement.height) - vH/2 - (cElement.height * yOffsetRatio);
                
                ctx.drawImage(vid, drawX, drawY, vW, vH);
                ctx.restore();
            }
        }

        // Handle Left Hand (Naruto/Blue)
        if (!fL && pwr[0] > 0.01) {
            pwr[0] = Math.max(0, pwr[0] - 0.15);
            wasOpen[0] = false;
        }
        drawFX(n, 0, pwr[0], 1.25, 0.1);

        // Handle Right Hand (Sasuke/Purple)
        if (!fR && pwr[1] > 0.01) {
            pwr[1] = Math.max(0, pwr[1] - 0.15);
            wasOpen[1] = false;
        }
        drawFX(s, 1, pwr[1], 1.8, 0);
    }

    // --- MediaPipe Init ---
    const h = new Hands({
        locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
    });

    h.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.65,
        minTrackingConfidence: 0.65
    });
    h.onResults(onResults);

    // --- Camera Loop & Setup ---
    async function cameraLoop() {
        if (isProcessing) {
            try {
                await h.send({ image: vElement });
            } catch(e) {}
            requestAnimationFrame(cameraLoop);
        }
    }

    async function startCamera() {
        if (cameraStream) {
            cameraStream.getTracks().forEach(t => t.stop());
        }
        
        const constraints = {
            video: {
                facingMode: useFrontCamera ? "user" : "environment",
                width: { ideal: 1280 },
                height: { ideal: 720 }
            }
        };

        try {
            cameraStream = await navigator.mediaDevices.getUserMedia(constraints);
            vElement.srcObject = cameraStream;
            return new Promise(resolve => {
                vElement.onloadedmetadata = () => {
                    vElement.play();
                    resolve();
                };
            });
        } catch (e) {
            console.error("Error accessing camera: ", e);
            alert("Could not access camera. Please check permissions.");
        }
    }

    // --- UI Controls ---
    btnCamera.addEventListener('click', async () => {
        useFrontCamera = !useFrontCamera;
        isProcessing = false; // pause loop
        await startCamera();
        isProcessing = true;
        cameraLoop();
    });

    btnRecord.addEventListener('click', () => {
        if (!isRecording) {
            startRecording();
            btnRecord.innerText = "Stop Recording";
            btnRecord.classList.add('recording');
        } else {
            stopRecording();
            btnRecord.innerText = "Record";
            btnRecord.classList.remove('recording');
        }
    });

    function startRecording() {
        // Capture 30 FPS stream from canvas
        const stream = cElement.captureStream(30);
        
        let options = undefined; // let browser decide best
        if (MediaRecorder.isTypeSupported('video/mp4')) {
            options = { mimeType: 'video/mp4' };
        } else if (MediaRecorder.isTypeSupported('video/webm; codecs=vp9')) {
            options = { mimeType: 'video/webm; codecs=vp9' };
        } else if (MediaRecorder.isTypeSupported('video/webm')) {
            options = { mimeType: 'video/webm' };
        }
        
        mediaRecorder = new MediaRecorder(stream, options);
        recordedChunks = [];
        
        mediaRecorder.ondataavailable = function(e) {
            if (e.data.size > 0) recordedChunks.push(e.data);
        };
        
        mediaRecorder.onstop = function() {
            let mimeType = mediaRecorder.mimeType || 'video/webm';
            let ext = mimeType.includes('mp4') ? 'mp4' : 'webm';
            
            const blob = new Blob(recordedChunks, { type: mimeType });
            recordedChunks = [];
            
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            // Native download mechanism
            a.download = `naruto-sasuke-fx.${ext}`;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => {
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
            }, 100);
        };
        
        mediaRecorder.start();
        isRecording = true;
    }

    function stopRecording() {
        if (mediaRecorder && isRecording) {
            mediaRecorder.stop();
            isRecording = false;
        }
    }

    // Start everything on load
    window.addEventListener('DOMContentLoaded', () => {
        // Wait for MediaPipe to load
        // Sometimes hands.js takes a brief moment to initialize the backend when send is called
        startCamera().then(() => {
            isProcessing = true;
            cameraLoop();
        });
    });

  </script>
</body>
</html>
